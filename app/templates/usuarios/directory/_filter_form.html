{% load lucide %}
<form method="get" class="grid grid-cols-1 md:grid-cols-[12rem_1fr_auto] gap-3 items-end mb-6" role="search" aria-label="Filtros de directorio">
  <div class="space-y-1.5">
    <label for="filter_role" class="block text-sm font-medium text-zinc-900">Rol</label>
    <select id="filter_role" name="role"
            class="block w-full h-10 px-3 pr-8 rounded-md border border-zinc-300 bg-white text-sm text-zinc-900
                   focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-zinc-900">
      {% for value, label in form.role.field.choices %}
        <option value="{{ value }}" {% if filters.role.value == value %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="space-y-1.5">
    <label for="filter_q" class="block text-sm font-medium text-zinc-900">Buscar (matrícula, nombre o correo)</label>
    <input type="search" id="filter_q" name="q"
           value="{{ filters.q }}" maxlength="200"
           placeholder="Ej. 12345678 o María"
           class="block w-full h-10 px-3 rounded-md border border-zinc-300 bg-white text-sm text-zinc-900
                  placeholder:text-zinc-400
                  focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-zinc-900" />
  </div>

  <div class="flex items-end gap-2">
    <button type="submit"
            class="inline-flex items-center gap-1.5 h-10 px-4 rounded-md bg-zinc-900 text-white text-sm font-medium
                   hover:bg-black focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-zinc-900">
      {% lucide "funnel" class="size-4" %}<span>Buscar</span>
    </button>
    <a href="{% url 'usuarios:directory:list' %}"
       class="inline-flex items-center h-10 px-4 rounded-md border border-zinc-300 bg-white text-sm text-zinc-900
              hover:bg-zinc-50
              focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-zinc-900">
      Limpiar
    </a>
  </div>
</form>
