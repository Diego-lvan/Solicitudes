{# Renders one <tr> for a SolicitudRow. Expects `row` (SolicitudRow). #}
<tr>
  <td>
    <a href="{% url 'solicitudes:intake:detail' folio=row.folio %}">{{ row.folio }}</a>
  </td>
  <td>{{ row.tipo_nombre }}</td>
  <td class="d-none d-lg-table-cell">{{ row.solicitante_nombre }}</td>
  <td class="d-none d-md-table-cell">{{ row.created_at|date:"d/m/Y" }}</td>
  <td>{% include "solicitudes/_partials/_estado_badge.html" with estado=row.estado %}</td>
</tr>
