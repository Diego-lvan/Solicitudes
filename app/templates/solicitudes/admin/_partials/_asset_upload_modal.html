{# Modal de upload in-place. Activado por Alpine `uploadModalOpen`. #}
<div x-cloak x-show="uploadModalOpen"
     class="fixed inset-0 z-50 flex items-center justify-center"
     role="dialog" aria-modal="true" aria-labelledby="upload-modal-title">
  <div class="absolute inset-0 bg-zinc-950/40" @click="uploadModalOpen = false"></div>

  <div class="relative bg-white rounded-lg border border-zinc-200 shadow w-full max-w-md mx-4 p-5">
    <header class="flex items-center justify-between mb-3">
      <h2 id="upload-modal-title" class="text-lg font-semibold text-zinc-900">Subir imagen</h2>
      <button type="button" @click="uploadModalOpen = false" aria-label="Cerrar"
              class="text-zinc-500 hover:text-zinc-900">✕</button>
    </header>

    <form @submit.prevent="submitUpload($event)" class="space-y-4">
      <div class="space-y-1.5">
        <label class="block text-sm font-medium text-zinc-900" for="upload-nombre">
          Nombre<span class="text-red-600 ml-0.5" aria-hidden="true">*</span>
        </label>
        <input id="upload-nombre" name="nombre" required minlength="2" maxlength="120"
               x-model="uploadForm.nombre"
               class="block w-full h-10 px-3 rounded-md border border-zinc-300 bg-white text-sm text-zinc-900
                      focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-zinc-900" />
      </div>

      <div class="space-y-1.5">
        <label class="block text-sm font-medium text-zinc-900" for="upload-imagen">
          Archivo<span class="text-red-600 ml-0.5" aria-hidden="true">*</span>
        </label>
        <input id="upload-imagen" name="imagen" type="file"
               accept=".png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp"
               required
               x-ref="uploadFile"
               class="block w-full text-sm text-zinc-800
                      file:mr-3 file:h-9 file:px-3 file:rounded-md file:border-0
                      file:bg-zinc-100 file:text-sm file:text-zinc-900 hover:file:bg-zinc-200" />
        <p class="text-xs text-zinc-500">PNG, JPG o WEBP. Máximo 2&nbsp;MB.</p>
      </div>

      <fieldset class="space-y-1.5" x-show="plantillaId">
        <legend class="text-sm font-medium text-zinc-900">Alcance</legend>
        <label class="flex items-center gap-2 text-sm text-zinc-800">
          <input type="radio" name="upload-scope" value="plantilla" x-model="uploadForm.scope" />
          Solo en esta plantilla
        </label>
        <label class="flex items-center gap-2 text-sm text-zinc-800">
          <input type="radio" name="upload-scope" value="global" x-model="uploadForm.scope" />
          Global (disponible en todas las plantillas)
        </label>
      </fieldset>

      <label class="flex items-center gap-2 text-sm text-zinc-800">
        <input type="checkbox" x-model="uploadForm.insertAfter" />
        Insertar la imagen en el HTML al terminar la subida
      </label>

      <p x-show="uploadError" x-text="uploadError" role="alert"
         class="text-xs text-red-600"></p>

      <div class="flex justify-end gap-2 pt-2">
        <button type="button" @click="uploadModalOpen = false"
                class="inline-flex items-center h-10 px-4 rounded-md border border-zinc-300 bg-white text-sm text-zinc-900 hover:bg-zinc-50">
          Cancelar
        </button>
        <button type="submit" :disabled="uploadBusy"
                class="inline-flex items-center h-10 px-4 rounded-md bg-zinc-900 text-white text-sm font-medium hover:bg-black disabled:opacity-50">
          <span x-show="!uploadBusy">Subir</span>
          <span x-show="uploadBusy">Subiendo…</span>
        </button>
      </div>
    </form>
  </div>
</div>
