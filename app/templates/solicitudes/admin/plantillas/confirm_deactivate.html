{% extends "base.html" %}

{% block title %}Desactivar plantilla · {{ block.super }}{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <h1 class="text-2xl font-semibold text-zinc-900 mb-3">Desactivar «{{ plantilla.nombre }}»</h1>
  <p class="text-sm text-zinc-500 mb-6">La plantilla quedará inactiva y no aparecerá en el selector de tipos.</p>

  <form method="post" class="flex justify-end gap-2">
    {% csrf_token %}
    <a href="{% url 'solicitudes:plantillas:detail' plantilla_id=plantilla.id %}"
       class="inline-flex items-center h-10 px-4 rounded-md border border-zinc-300 bg-white text-sm text-zinc-900
              hover:bg-zinc-50
              focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-zinc-900">
      Cancelar
    </a>
    <button type="submit"
            class="inline-flex items-center h-10 px-4 rounded-md bg-red-600 text-white text-sm font-medium
                   hover:bg-red-700 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-600">
      Desactivar
    </button>
  </form>
</div>
{% endblock %}
