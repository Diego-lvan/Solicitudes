{% comment %}
Shared GET filter form for /reportes/ and /reportes/lista/.
`selected_estado`, `selected_tipo_id`, `selected_role` are pre-stringified
in views/_helpers.py:filter_form_choices so the comparisons match the
`option`'s string `value` attribute exactly.
{% endcomment %}
<form method="get" class="row g-2 align-items-end mb-4">
  <div class="col-12 col-md-3">
    <label class="form-label" for="filter_estado">Estado</label>
    <select class="form-select" name="estado" id="filter_estado">
      <option value="">Todos</option>
      {% for value, label in estado_choices %}
        <option value="{{ value }}" {% if selected_estado == value %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="col-12 col-md-3">
    <label class="form-label" for="filter_tipo">Tipo</label>
    <select class="form-select" name="tipo_id" id="filter_tipo">
      <option value="">Todos</option>
      {% for value, label in tipo_choices %}
        <option value="{{ value }}" {% if selected_tipo_id == value %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="col-12 col-md-3">
    <label class="form-label" for="filter_role">Responsable</label>
    <select class="form-select" name="responsible_role" id="filter_role">
      <option value="">Todos</option>
      {% for value, label in role_choices %}
        <option value="{{ value }}" {% if selected_role == value %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="col-6 col-md-2">
    <label class="form-label" for="filter_from">Desde</label>
    <input type="date" class="form-control" name="created_from" id="filter_from" value="{{ filter.created_from|default_if_none:'' }}" />
  </div>

  <div class="col-6 col-md-2">
    <label class="form-label" for="filter_to">Hasta</label>
    <input type="date" class="form-control" name="created_to" id="filter_to" value="{{ filter.created_to|default_if_none:'' }}" />
  </div>

  <div class="col-12 col-md-auto">
    <button type="submit" class="btn btn-primary">
      <i class="bi bi-funnel me-1" aria-hidden="true"></i> Aplicar
    </button>
    <a href="{% url 'reportes:dashboard' %}" class="btn btn-outline-secondary">Limpiar</a>
  </div>
</form>
