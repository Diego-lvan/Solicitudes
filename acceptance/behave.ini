[behave]
paths = features
show_skipped = false
show_timings = true
lang = es

[behave.userdata]
# URL base del sistema bajo prueba (stack dev vía nginx). Override:
#   behave -D base_url=https://localhost
base_url = https://localhost
# Navegador headless por defecto. Para depurar: -D headless=false
headless = true
