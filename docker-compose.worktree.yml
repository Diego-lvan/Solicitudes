services:
  # Worktree skips nginx-dev (TLS termination) — we hit the web container
  # directly on host port 8015 to keep screenshots simple (no self-signed
  # cert handshake) and to avoid colliding with the main stack's 80/443.
  nginx-dev:
    profiles: ["disabled"]

  db:
    ports: !override
      - "5433:5432"

  web:
    ports:
      - "8015:8000"

networks:
  solicitudes-net:
    name: solicitudes013_solicitudes-net
